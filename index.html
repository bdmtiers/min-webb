<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Case Opening</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* Titel */
h1 {
  color: #00ffd5;
  margin-bottom: 20px;
}

/* Fönster (det du ser) */
.window {
  width: 320px;
  overflow: hidden;
  border: 2px solid #333;
  border-radius: 10px;
  position: relative;
}

/* Marker (mitten där item landar) */
.marker {
  position: absolute;
  left: 50%;
  top: 0;
  bottom: 0;
  width: 2px;
  background: red;
  transform: translateX(-50%);
}

/* Raden som rullar */
.track {
  display: flex;
  width: max-content;
  transition: transform 4s cubic-bezier(.1,.8,.2,1);
}

/* Items */
.item {
  width: 100px;
  height: 100px;
  margin: 10px;
  background: #1c1c1c;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  border: 1px solid #333;
}

/* Rarity colors */
.common { color: #aaa; }
.rare { color: #4da3ff; }
.epic { color: #b84dff; }
.legendary { color: gold; }

button {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  background: #00ffd5;
  font-weight: bold;
  cursor: pointer;
  border-radius: 8px;
}

button:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<h1>CASE OPENING</h1>

<div class="window">
  <div class="marker"></div>
  <div class="track" id="track"></div>
</div>

<button onclick="spin()">Open Case</button>

<script>
const items = [
  { name: "Iron", rarity: "common" },
  { name: "Stone", rarity: "common" },
  { name: "Bow", rarity: "rare" },
  { name: "Staff", rarity: "epic" },
  { name: "DRAGON SWORD", rarity: "legendary" }
];

const track = document.getElementById("track");

function createItems() {
  track.innerHTML = "";

  // skapa massa items (så det ser ut som CS roll)
  for (let i = 0; i < 25; i++) {
    const item = items[Math.floor(Math.random() * items.length)];

    const div = document.createElement("div");
    div.className = "item " + item.rarity;
    div.textContent = item.name;

    track.appendChild(div);
  }
}

function spin() {
  createItems();

  // reset position
  track.style.transition = "none";
  track.style.transform = "translateX(0px)";

  // force reflow
  void track.offsetWidth;

  track.style.transition = "transform 4s cubic-bezier(.1,.8,.2,1)";

  // slumpmässig “landning”
  const randomOffset = -(Math.floor(Math.random() * 10) + 10) * 120;

  track.style.transform = `translateX(${randomOffset}px)`;
}

createItems();
</script>

</body>
</html>
