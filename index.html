<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Case</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Barlow+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #e4bc5a;
  --red: #eb4b4b;
  --pink: #d32ce6;
  --purple: #8847ff;
  --blue: #4b69ff;
  --teal: #5e98d9;
  --gray: #b0c3d9;
  --bg: #0d0f14;
  --surface: #161a24;
  --surface2: #1c2130;
  --border: #252c3d;
}

html, body {
  height: 100%;
  background: var(--bg);
  overflow: hidden;
  font-family: 'Barlow Condensed', sans-serif;
}

/* ── Landing: just the button ── */
#landing {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  z-index: 1;
  transition: opacity 0.4s, pointer-events 0s 0.4s;
}

#landing.hidden {
  opacity: 0;
  pointer-events: none;
}

/* Subtle radial glow behind button */
#landing::before {
  content: '';
  position: absolute;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(228,188,90,0.06) 0%, transparent 70%);
  pointer-events: none;
}

.big-btn {
  position: relative;
  width: 220px;
  height: 220px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  background: none;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}

/* Outer ring */
.big-btn::before {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  background: conic-gradient(var(--gold), #c9a44e, var(--gold), #8a6b28, var(--gold));
  opacity: 0.7;
  animation: spin-ring 8s linear infinite;
}

/* Inner fill */
.big-btn::after {
  content: '';
  position: absolute;
  inset: 2px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 35%, #2a2310, #0d0f14);
  border: 1px solid rgba(228,188,90,0.15);
}

@keyframes spin-ring {
  to { transform: rotate(360deg); }
}

.btn-inner {
  position: absolute;
  inset: 2px;
  border-radius: 50%;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: transform 0.15s;
}

.big-btn:hover .btn-inner { transform: scale(1.04); }
.big-btn:active .btn-inner { transform: scale(0.96); }

.btn-icon {
  font-size: 52px;
  line-height: 1;
  filter: drop-shadow(0 0 12px rgba(228,188,90,0.5));
}

.btn-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.9;
}

/* Pulse rings */
.pulse-ring {
  position: absolute;
  inset: -30px;
  border-radius: 50%;
  border: 1px solid rgba(228,188,90,0.15);
  animation: pulse 3s ease-out infinite;
}
.pulse-ring:nth-child(2) { inset: -60px; animation-delay: 1s; }
.pulse-ring:nth-child(3) { inset: -90px; animation-delay: 2s; }

@keyframes pulse {
  0% { opacity: 0.6; transform: scale(0.95); }
  100% { opacity: 0; transform: scale(1.05); }
}

/* ── Overlay ── */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.96);
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s;
}

#overlay.show {
  opacity: 1;
  pointer-events: all;
}

.close-btn {
  position: absolute;
  top: 24px;
  right: 28px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: #5a6478;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 8px 16px;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
}
.close-btn:hover { color: #fff; border-color: #fff; }

/* ── Spinner ── */
.spinner-wrapper {
  width: min(860px, 92vw);
  position: relative;
}

.spinner-track {
  overflow: hidden;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  position: relative;
  height: 148px;
}

.spinner-track::before,
.spinner-track::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  width: 140px;
  z-index: 10;
  pointer-events: none;
}
.spinner-track::before { left: 0; background: linear-gradient(to right, var(--surface), transparent); }
.spinner-track::after  { right: 0; background: linear-gradient(to left,  var(--surface), transparent); }

.spinner-needle {
  position: absolute;
  top: 0; bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  background: var(--gold);
  z-index: 20;
  pointer-events: none;
}
.spinner-needle::before, .spinner-needle::after {
  content: '';
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  border-left: 7px solid transparent;
  border-right: 7px solid transparent;
}
.spinner-needle::before { top: 0;    border-top:    10px solid var(--gold); }
.spinner-needle::after  { bottom: 0; border-bottom: 10px solid var(--gold); }

.spinner-strip {
  display: flex;
  align-items: center;
  height: 100%;
  gap: 4px;
  padding: 0 4px;
  will-change: transform;
}

.item-card {
  flex-shrink: 0;
  width: 120px;
  height: 120px;
  border-radius: 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 10px 8px 8px;
  position: relative;
  overflow: hidden;
  border: 2px solid transparent;
  background: var(--surface2);
}

.item-card .item-icon {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -62%);
  font-size: 38px;
  opacity: 0.9;
}
.item-card .item-name {
  font-size: 10px; font-weight: 500; letter-spacing: 1px;
  text-align: center; text-transform: uppercase; color: #fff;
  line-height: 1.2; position: relative; z-index: 1;
}
.item-card .item-rarity {
  font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
  margin-top: 2px; font-weight: 600; position: relative; z-index: 1;
}
.item-card .shine {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 60%);
  pointer-events: none;
}

.r-consumer   { border-color: var(--gray);   } .r-consumer   .item-rarity { color: var(--gray);   }
.r-industrial { border-color: var(--teal);   } .r-industrial .item-rarity { color: var(--teal);   }
.r-milspec    { border-color: var(--blue);   } .r-milspec    .item-rarity { color: var(--blue);   }
.r-restricted { border-color: var(--purple); } .r-restricted .item-rarity { color: var(--purple); }
.r-classified { border-color: var(--pink);   } .r-classified .item-rarity { color: var(--pink);   }
.r-covert     { border-color: var(--red);    } .r-covert     .item-rarity { color: var(--red);    }
.r-gold       { border-color: var(--gold);   } .r-gold       .item-rarity { color: var(--gold);   }

/* ── Open button inside overlay ── */
.spin-btn {
  padding: 15px 56px;
  background: linear-gradient(135deg, #c9a44e, #e4bc5a, #c9a44e);
  border: none;
  border-radius: 4px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #1a1200;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.1s, box-shadow 0.2s;
  box-shadow: 0 4px 24px rgba(228,188,90,0.25);
}
.spin-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.35), transparent);
  transform: skewX(-20deg);
  transition: left 0.5s;
}
.spin-btn:hover::before { left: 160%; }
.spin-btn:hover { box-shadow: 0 6px 32px rgba(228,188,90,0.45); transform: translateY(-1px); }
.spin-btn:active { transform: scale(0.97); }
.spin-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

/* Rarity legend */
.legend {
  display: flex; gap: 18px; flex-wrap: wrap; justify-content: center;
}
.legend-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #4a5568;
}
.legend-dot {
  width: 8px; height: 8px; border-radius: 2px;
}

/* Inventory button on landing */
#inv-panel {
  position: fixed;
  inset: 0;
  z-index: 40;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 24px 40px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  overflow-y: auto;
}
#inv-panel.show { opacity: 1; pointer-events: all; }

.inv-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: min(800px, 100%);
  margin-bottom: 28px;
}

.inv-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 28px; font-weight: 700;
  letter-spacing: 5px; text-transform: uppercase;
  color: #fff;
}

.inv-count {
  font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
  color: #4a5568; margin-top: 2px;
}

.btn-back {
  padding: 10px 22px;
  background: transparent;
  border: 1px solid var(--border); border-radius: 4px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: #4a5568;
  cursor: pointer; transition: color 0.2s, border-color 0.2s;
}
.btn-back:hover { color: #fff; border-color: #fff; }

.inv-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  width: min(800px, 100%);
  justify-content: flex-start;
}

.inv-item {
  width: 110px; height: 110px;
  border-radius: 6px;
  background: var(--surface2);
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding: 8px 6px 8px;
  border: 1.5px solid;
  position: relative; overflow: hidden;
}
.inv-item .inv-emoji {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -65%); font-size: 34px;
}
.inv-item .inv-name {
  font-size: 9px; letter-spacing: 0.8px; text-transform: uppercase;
  text-align: center; font-weight: 500; color: #fff;
  line-height: 1.2; position: relative; z-index: 1;
}

.inv-empty {
  color: #2a3040; font-size: 14px; letter-spacing: 3px;
  text-transform: uppercase; margin-top: 60px;
}

/* Inventory button on landing */
.inv-btn-landing {
  position: fixed;
  bottom: 32px;
  right: 32px;
  padding: 10px 20px;
  background: transparent;
  border: 1px solid var(--border); border-radius: 4px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: #4a5568;
  cursor: pointer; transition: color 0.2s, border-color 0.2s;
  z-index: 2;
}
.inv-btn-landing:hover { color: #fff; border-color: #fff; }
</style>
</head>
<body>

<!-- Landing: just the button -->
<div id="landing">
  <div class="pulse-ring"></div>
  <div class="pulse-ring"></div>
  <div class="pulse-ring"></div>
  <button class="big-btn" onclick="openOverlay()" aria-label="Open case">
    <div class="btn-inner">
      <div class="btn-icon">📦</div>
      <div class="btn-label">Open</div>
    </div>
  </button>
  <button class="inv-btn-landing" onclick="showInventory()">Inventory</button>
</div>

<!-- Inventory panel -->
<div id="inv-panel">
  <div class="inv-header">
    <div>
      <div class="inv-title">Inventory</div>
      <div class="inv-count" id="invCount">0 items</div>
    </div>
    <button class="btn-back" onclick="hideInventory()">← Back</button>
  </div>
  <div class="inv-grid" id="invGrid">
    <div class="inv-empty" id="invEmpty">Nothing here yet</div>
  </div>
</div>

<!-- Spin overlay -->
<div id="overlay">
  <div class="spinner-wrapper">
    <div class="spinner-track" id="spinnerTrack">
      <div class="spinner-needle"></div>
      <div class="spinner-strip" id="strip"></div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--gray)"></div>Consumer</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--teal)"></div>Industrial</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Mil-Spec</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>Restricted</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--pink)"></div>Classified</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Covert</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div>Extraordinary</div>
  </div>
</div>



<script>
const ITEMS = [
  { name: 'Shadow Pistol',  rarity: 'consumer',      cls: 'r-consumer',   emoji: '🔫', prob: 0.40 },
  { name: 'Iron Dagger',    rarity: 'consumer',      cls: 'r-consumer',   emoji: '🗡️', prob: 0.40 },
  { name: 'Neon Buster',    rarity: 'industrial',    cls: 'r-industrial', emoji: '🔧', prob: 0.32 },
  { name: 'Cold Steel',     rarity: 'industrial',    cls: 'r-industrial', emoji: '⚙️', prob: 0.32 },
  { name: 'Arc Rifle',      rarity: 'mil-spec',      cls: 'r-milspec',    emoji: '🔩', prob: 0.18 },
  { name: 'Storm Blade',    rarity: 'mil-spec',      cls: 'r-milspec',    emoji: '⚡', prob: 0.18 },
  { name: 'Phantom Edge',   rarity: 'restricted',    cls: 'r-restricted', emoji: '🌀', prob: 0.08 },
  { name: 'Void Runner',    rarity: 'restricted',    cls: 'r-restricted', emoji: '💜', prob: 0.08 },
  { name: 'Dragon Tooth',   rarity: 'classified',    cls: 'r-classified', emoji: '🔮', prob: 0.032 },
  { name: 'Neon Serpent',   rarity: 'classified',    cls: 'r-classified', emoji: '🌸', prob: 0.032 },
  { name: 'Blood Contract', rarity: 'covert',        cls: 'r-covert',     emoji: '🔥', prob: 0.0064 },
  { name: 'Death Whisper',  rarity: 'covert',        cls: 'r-covert',     emoji: '💀', prob: 0.0064 },
  { name: '★ Golden Wrath', rarity: 'extraordinary', cls: 'r-gold',       emoji: '⭐', prob: 0.0026 },
];

const RARITY_COLOR = {
  consumer: 'var(--gray)', industrial: 'var(--teal)', 'mil-spec': 'var(--blue)',
  restricted: 'var(--purple)', classified: 'var(--pink)', covert: 'var(--red)',
  extraordinary: 'var(--gold)'
};

// Load inventory from localStorage
let inventory = [];
try { inventory = JSON.parse(localStorage.getItem('dropzone_inventory') || '[]'); } catch(e) {}

function saveInventory() {
  try { localStorage.setItem('dropzone_inventory', JSON.stringify(inventory)); } catch(e) {}
}

let spinning = false;
let animFrame = null;

function weightedRandom() {
  const total = ITEMS.reduce((s, i) => s + i.prob, 0);
  let r = Math.random() * total;
  for (const item of ITEMS) { r -= item.prob; if (r <= 0) return item; }
  return ITEMS[0];
}

function makeCard(item) {
  const d = document.createElement('div');
  d.className = `item-card ${item.cls}`;
  d.innerHTML = `<div class="shine"></div><div class="item-icon">${item.emoji}</div><div class="item-name">${item.name}</div><div class="item-rarity">${item.rarity}</div>`;
  return d;
}

function buildStrip(winnerIndex) {
  const strip = document.getElementById('strip');
  strip.innerHTML = '';
  strip.style.transform = 'translateX(0px)';
  const TOTAL = 80, WIN_POS = 66;
  for (let i = 0; i < TOTAL; i++) {
    strip.appendChild(makeCard(i === WIN_POS ? ITEMS[winnerIndex] : weightedRandom()));
  }
  return WIN_POS;
}

function triggerOpen() {
  if (spinning) return;
  spinning = true;

  const wonItem = weightedRandom();
  const winnerIndex = ITEMS.indexOf(wonItem);
  const winPos = buildStrip(winnerIndex);

  const strip = document.getElementById('strip');
  const CARD_W = 124;
  const trackW = document.getElementById('spinnerTrack').offsetWidth;
  const targetX = -(winPos * CARD_W - trackW / 2 + CARD_W / 2);

  const duration = 6200;
  const start = performance.now();

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function animate(now) {
    const t = Math.min((now - start) / duration, 1);
    strip.style.transform = `translateX(${targetX * easeOut(t)}px)`;
    if (t < 1) {
      animFrame = requestAnimationFrame(animate);
    } else {
      spinning = false;
      animFrame = null;
      // Save item and close silently
      inventory.unshift({ ...wonItem, id: Date.now() });
      saveInventory();
      setTimeout(closeOverlay, 600);
    }
  }

  animFrame = requestAnimationFrame(animate);
}

function openOverlay() {
  document.getElementById('landing').classList.add('hidden');
  document.getElementById('overlay').classList.add('show');
  setTimeout(triggerOpen, 300);
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
  setTimeout(() => document.getElementById('landing').classList.remove('hidden'), 10);
}

function showInventory() {
  renderInventory();
  document.getElementById('landing').classList.add('hidden');
  document.getElementById('inv-panel').classList.add('show');
}

function hideInventory() {
  document.getElementById('inv-panel').classList.remove('show');
  setTimeout(() => document.getElementById('landing').classList.remove('hidden'), 10);
}

function renderInventory() {
  const grid = document.getElementById('invGrid');
  const empty = document.getElementById('invEmpty');
  document.getElementById('invCount').textContent = `${inventory.length} item${inventory.length !== 1 ? 's' : ''}`;
  grid.querySelectorAll('.inv-item').forEach(el => el.remove());

  if (inventory.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  inventory.forEach(item => {
    const el = document.createElement('div');
    el.className = 'inv-item';
    el.style.borderColor = RARITY_COLOR[item.rarity] || '#fff';
    el.innerHTML = `<div class="inv-emoji">${item.emoji}</div><div class="inv-name">${item.name}</div>`;
    grid.appendChild(el);
  });
}
</script>
</body>
</html>
