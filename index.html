<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Case Opening</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* Titel */
h1 {
  color: #00ffd5;
  margin-bottom: 20px;
  text-shadow: 0 0 10px #00ffd5;
}

/* RESULT TEXT */
.result {
  margin-top: 20px;
  font-size: 1.5rem;
  color: gold;
  text-shadow: 0 0 10px gold;
  height: 30px;
}

/* WINDOW (större nu) */
.window {
  width: 90%;
  max-width: 600px;
  height: 140px;
  overflow: hidden;
  border: 2px solid #333;
  border-radius: 12px;
  position: relative;
  background: #111;
}

/* center marker */
.marker {
  position: absolute;
  left: 50%;
  top: 0;
  bottom: 0;
  width: 3px;
  background: red;
  transform: translateX(-50%);
  z-index: 2;
}

/* track */
.track {
  display: flex;
  width: max-content;
  transition: transform 4s cubic-bezier(.1,.8,.2,1);
}

/* item */
.item {
  width: 120px;
  height: 120px;
  margin: 10px;
  border-radius: 10px;
  background: #1c1c1c;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #333;
  font-size: 14px;
}

/* rarities */
.common { color: #aaa; }
.rare { color: #4da3ff; }
.epic { color: #b84dff; }
.legendary { color: gold; }

button {
  margin-top: 25px;
  padding: 12px 25px;
  border: none;
  background: #00ffd5;
  font-weight: bold;
  cursor: pointer;
  border-radius: 10px;
}

button:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<h1>CASE OPENING</h1>

<div class="window">
  <div class="marker"></div>
  <div class="track" id="track"></div>
</div>

<button onclick="spin()">Öppna Case</button>

<div class="result" id="resultText"></div>

<script>
const items = [
  { name: "Iron Sword", rarity: "common" },
  { name: "Wood Shield", rarity: "common" },
  { name: "Magic Bow", rarity: "rare" },
  { name: "Wizard Staff", rarity: "epic" },
  { name: "DRAGON BLADE", rarity: "legendary" }
];

const track = document.getElementById("track");
const resultText = document.getElementById("resultText");

function createItems() {
  track.innerHTML = "";

  for (let i = 0; i < 30; i++) {
    const item = items[Math.floor(Math.random() * items.length)];

    const div = document.createElement("div");
    div.className = "item " + item.rarity;
    div.textContent = item.name;

    track.appendChild(div);
  }
}

function spin() {
  resultText.textContent = "";
  createItems();

  track.style.transition = "none";
  track.style.transform = "translateX(0px)";
  void track.offsetWidth;
  track.style.transition = "transform 4s cubic-bezier(.1,.8,.2,1)";

  const offset = -(Math.floor(Math.random() * 10) + 15) * 130;
  track.style.transform = `translateX(${offset}px)`;

  // visa resultat efter spin
  setTimeout(() => {
    const landed = items[Math.floor(Math.random() * items.length)];
    resultText.textContent = `Du fick: ${landed.name}`;
  }, 4200);
}

createItems();
</script>

</body>
</html>
